<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiche horaire — GGMobilités</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #0F0F0F; color: #F0EDE6; display: flex; align-items: center; justify-content: center; min-height: 100vh; flex-direction: column; gap: 1rem; }
    .msg { font-size: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #C9A84C; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="msg">Génération de la fiche horaire...</div>
<script>
const params = new URLSearchParams(window.location.search);
const CODE = params.get('code') || 'C1';
const DIRECTION = params.get('direction') || 'Palluel';
const JOUR = params.get('jour') || 'semaine';

const BADGE_COLORS = {
  C1:'#185FA5',C2:'#0F6E56',C3:'#993C1D','4':'#534AB7',
  '5':'#3B6D11','6':'#854F0B','7':'#993556','8':'#5F5E5A',
  '9':'#0A6BAB','10':'#0F6E56','11':'#A32D2D','60':'#412402',
  '61':'#3B6D11',PL1:'#2C2C2A'
};

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

async function generer() {
  const res = await fetch('lines.json');
  const lines = await res.json();
  const ligne = lines.find(l => l.code === CODE && l.direction === DIRECTION && l.jour === JOUR);

  if (!ligne) {
    document.querySelector('.msg').textContent = 'Ligne introuvable.';
    return;
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = 297, H = 210;
  const color = hexToRgb(BADGE_COLORS[CODE] || '#333');
  const jourLabel = {semaine:'Lundi – Vendredi', samedi:'Samedi', dimanche:'Dimanche'}[JOUR] || JOUR;

  // ── En-tête coloré ──────────────────────────────────────────
  doc.setFillColor(...color);
  doc.rect(0, 0, W, 28, 'F');

  // Logo texte
  doc.setTextColor(255,255,255);
  doc.setFontSize(9);
  doc.setFont('helvetica','bold');
  doc.text('GGMobilités', 12, 10);

  // Numéro de ligne (grand)
  doc.setFontSize(22);
  doc.setFont('helvetica','bold');
  doc.setFillColor(255,255,255,30);
  doc.roundedRect(8, 13, 24, 12, 2, 2, 'F');
  doc.setTextColor(...color);
  doc.text(CODE, 20, 22, {align:'center'});

  // Titre
  doc.setTextColor(255,255,255);
  doc.setFontSize(14);
  doc.text(`Direction ${DIRECTION}`, 38, 18);
  doc.setFontSize(8);
  doc.text(jourLabel, 38, 24);

  // Date
  doc.setFontSize(7);
  doc.setTextColor(200,200,200);
  doc.text(`Horaires applicables 2026 · Généré le ${new Date().toLocaleDateString('fr-FR')}`, W-12, 24, {align:'right'});

  // ── Corps : tableau des arrêts et horaires ──────────────────
  if (!ligne.arrets?.length) {
    doc.setTextColor(0,0,0);
    doc.setFontSize(10);
    doc.text('Aucun horaire disponible.', 20, 50);
    doc.save(`GGMobilites_${CODE}_${DIRECTION}.pdf`);
    return;
  }

  const arrets = ligne.arrets;
  const COL_ARRET = 55;
  const COL_START = 57;
  const ROW_H = 5.5;
  const HEADER_Y = 32;
  const MAX_PASSAGES_PAR_PAGE = 36; // colonnes

  // Identifier les plages de fréquence
  const FREQUENCES = {
    semaine: CODE === 'C1' ? [{debut:'05:00',fin:'07:30',freq:10},{debut:'07:30',fin:'19:00',freq:7},{debut:'19:00',fin:'00:15',freq:15}]
           : CODE === 'C2' ? [{debut:'05:00',fin:'07:30',freq:9},{debut:'07:30',fin:'19:00',freq:6},{debut:'19:00',fin:'00:30',freq:10}]
           : CODE === 'C3' ? [{debut:'05:00',fin:'07:30',freq:8},{debut:'07:30',fin:'19:00',freq:5},{debut:'19:00',fin:'00:30',freq:15}]
           : [{debut:'Variable',fin:'',freq:0}],
    samedi: CODE === 'C1' ? [{debut:'06:00',fin:'09:00',freq:12},{debut:'09:00',fin:'18:00',freq:10},{debut:'18:00',fin:'00:00',freq:15}] : [],
    dimanche: CODE === 'C1' ? [{debut:'06:00',fin:'10:00',freq:15},{debut:'10:00',fin:'17:00',freq:12},{debut:'17:00',fin:'23:00',freq:15}] : [],
  };

  // Prendre les passages du premier arrêt pour les colonnes
  const passagesTerm = arrets[0].passages;
  // Pour les lignes très fréquentes (<15min), regrouper par heure
  const isFrequent = passagesTerm.length > 50;

  doc.setTextColor(0,0,0);

  if (isFrequent) {
    // Mode fréquence : afficher la fréquence par planche horaire
    doc.setFillColor(245,245,245);
    doc.rect(8, HEADER_Y, W-16, 7, 'F');
    doc.setFontSize(7);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...color);
    doc.text('Arrêt', 10, HEADER_Y+5);

    // Tranches horaires
    const tranches = ['05h','06h','07h','08h','09h','10h','11h','12h','13h','14h','15h','16h','17h','18h','19h','20h','21h','22h','23h','00h'];
    const trancheW = (W - 16 - COL_ARRET) / tranches.length;

    tranches.forEach((t, ti) => {
      doc.text(t, COL_START + ti * trancheW + trancheW/2, HEADER_Y+5, {align:'center'});
    });

    // Ligne de séparation
    doc.setDrawColor(...color);
    doc.setLineWidth(0.5);
    doc.line(8, HEADER_Y+7, W-8, HEADER_Y+7);

    // Lignes d'arrêts
    arrets.forEach((arret, ai) => {
      const y = HEADER_Y + 8 + ai * ROW_H;
      if (y > H - 15) return; // éviter débordement

      // Fond alterné
      if (ai % 2 === 0) {
        doc.setFillColor(252,252,252);
        doc.rect(8, y-3.5, W-16, ROW_H, 'F');
      }

      // Nom arrêt
      doc.setFont('helvetica','normal');
      doc.setFontSize(6.5);
      doc.setTextColor(30,30,30);
      doc.text(arret.nom.substring(0,28), 10, y);

      // Premiers passages par tranche
      const passagesParTranche = {};
      arret.passages.forEach(h => {
        const hh = parseInt(h.split(':')[0]);
        const key = `${hh.toString().padStart(2,'0')}h`;
        if (!passagesParTranche[key]) passagesParTranche[key] = [];
        passagesParTranche[key].push(h.split(':')[1]); // garder les minutes
      });

      tranches.forEach((t, ti) => {
        const mins = passagesParTranche[t] || [];
        const x = COL_START + ti * trancheW + trancheW/2;
        doc.setFontSize(5.5);
        doc.setTextColor(60,60,60);
        if (mins.length > 0) {
          // Afficher les 2 premiers passages ou la fréquence si trop nombreux
          if (mins.length >= 6) {
            const freq = Math.round(60 / mins.length);
            doc.setTextColor(...color);
            doc.setFont('helvetica','bold');
            doc.text(`${freq}min`, x, y, {align:'center'});
            doc.setFont('helvetica','normal');
          } else {
            doc.text(mins.slice(0,2).join(' '), x, y, {align:'center'});
          }
        } else {
          doc.setTextColor(200,200,200);
          doc.text('·', x, y, {align:'center'});
        }
      });
    });

  } else {
    // Mode classique : colonnes = heures de passage
    const COL_W = 7;
    const maxCols = Math.floor((W - 16 - COL_ARRET) / COL_W);
    const passagesAff = passagesTerm.slice(0, maxCols);

    // En-tête passages
    doc.setFillColor(245,245,245);
    doc.rect(8, HEADER_Y, W-16, 7, 'F');
    doc.setFontSize(6.5);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...color);
    doc.text('Arrêt', 10, HEADER_Y+5);
    passagesAff.forEach((h, hi) => {
      doc.text(h, COL_START + hi * COL_W, HEADER_Y+5, {align:'center'});
    });

    doc.setDrawColor(...color);
    doc.setLineWidth(0.5);
    doc.line(8, HEADER_Y+7, W-8, HEADER_Y+7);

    arrets.forEach((arret, ai) => {
      const y = HEADER_Y + 8 + ai * ROW_H;
      if (y > H - 15) return;

      if (ai % 2 === 0) {
        doc.setFillColor(252,252,252);
        doc.rect(8, y-3.5, W-16, ROW_H, 'F');
      }

      doc.setFont('helvetica','normal');
      doc.setFontSize(6.5);
      doc.setTextColor(30,30,30);
      doc.text(arret.nom.substring(0,30), 10, y);

      // Passages de cet arrêt
      const passagesArret = arret.passages || [];
      passagesAff.forEach((refH, hi) => {
        const idx = arrets[0].passages.indexOf(refH);
        const h = idx >= 0 ? passagesArret[idx] : null;
        if (h) {
          doc.setFontSize(6);
          doc.setTextColor(50,50,50);
          doc.text(h, COL_START + hi * COL_W, y, {align:'center'});
        }
      });
    });
  }

  // ── Légende fréquences ──────────────────────────────────────
  const legendY = H - 12;
  doc.setFillColor(...color);
  doc.rect(0, legendY - 2, W, 14, 'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(7);
  doc.setFont('helvetica','bold');
  doc.text('Fréquences :', 12, legendY+3);
  doc.setFont('helvetica','normal');

  let freqX = 40;
  const freqs = FREQUENCES[JOUR] || [];
  freqs.forEach(f => {
    if (!f.debut || f.freq === 0) return;
    const txt = f.freq < 15 ? `${f.debut}–${f.fin} : toutes les ${f.freq} min` : `${f.debut}–${f.fin} : toutes les ${f.freq} min`;
    doc.text(txt, freqX, legendY+3);
    freqX += 80;
  });

  doc.text(`Ligne ${CODE} · Direction ${DIRECTION} · ${jourLabel}`, W/2, legendY+8, {align:'center'});

  // Sauvegarder
  doc.save(`GGMobilites_${CODE}_${DIRECTION}_${JOUR}.pdf`);
  document.querySelector('.msg').textContent = 'Téléchargement en cours...';
  setTimeout(() => window.close(), 1500);
}

generer().catch(e => {
  document.querySelector('.msg').textContent = 'Erreur : ' + e.message;
});
</script>
</body>
</html>
