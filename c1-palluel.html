    document.getElementById('live-content').innerHTML = `<div class="fin-svc"><div style="font-size:32px;margin-bottom:8px">🌙</div><div style="font-family:Syne,sans-serif;font-weight:700;color:var(--texte);margin-bottom:4px">Pas de service</div><div style="font-size:13px;color:var(--texte-sec)">Aucune circulation ce jour.</div></div>`;
    document.getElementById('arrets-list').innerHTML = '';
    return;
  }

  renderArrets();
  renderLive();
  if (ivl) clearInterval(ivl);
  ivl = setInterval(() => { renderLive(); renderArrets(); }, 30000);
}

function changerDir() {
  // Rediriger vers la page de l'autre direction
  const dir = document.getElementById('sel-dir').value;
  if (dir !== DIRECTION) {
    const slug = dir.toLowerCase().replace(/ /g,'_').replace(/'/g,'').replace(/[éèê]/g,'e').replace(/[àâ]/g,'a').replace(/[îï]/g,'i').replace(/[ôö]/g,'o').replace(/[ùûü]/g,'u');
    window.location.href = `${CODE.toLowerCase()}-${slug}.html`;
  }
}

function renderLive() {
  if (!ligneActuelle?.arrets?.length) return;
  const div = document.getElementById('live-content');
  const ref = arretSel !== null ? ligneActuelle.arrets[arretSel] : ligneActuelle.arrets[0];
  const dir = document.getElementById('sel-dir').value;

  const pvs = ref.passages.map((h,i) => {
    const p = perturb(`${ref.nom}-${i}`);
    return { h, p, mins: mAvant(h,p), hAff: hFmt(h,p) };
  }).filter(x => x.mins >= -1 && x.mins <= 90).sort((a,b)=>a.mins-b.mins).slice(0,6);

  if (!pvs.length) {
    div.innerHTML = `<div class="fin-svc"><div style="font-size:28px;margin-bottom:8px">🌙</div><div style="font-family:Syne,sans-serif;font-weight:700;color:var(--texte);margin-bottom:4px">Fin de service</div><div style="font-size:13px;color:var(--texte-sec)">Prochain service demain.</div></div>`;
    return;
  }

  const arretNom = arretSel !== null ? ref.nom : ligneActuelle.arrets[0].nom;
  let html = `<div style="font-size:11px;color:var(--texte-sec);padding:8px 16px;border-bottom:1px solid var(--bordure);display:flex;align-items:center;gap:6px"><span class="live-dot"></span><span>Arrêt : <strong style="color:var(--texte)">${arretNom}</strong></span><span style="margin-left:auto">${hNow()}</span></div>`;

  pvs.forEach((pv, i) => {
    const cls = pv.mins <= 0 ? 'm0' : pv.mins <= 5 ? 'soon' : pv.mins <= 15 ? 'mid' : 'far';
    const val = pv.mins <= 0 ? '0' : pv.mins <= 60 ? String(pv.mins) : pv.hAff;
    const lbl = pv.mins <= 0 ? "À l'arrêt" : pv.mins <= 60 ? 'min' : '';
    const retard = pv.p > 0 ? `<span style="font-size:10px;color:#E67E22;margin-left:4px">+${pv.p}</span>` : '';
    const pct = Math.min(100, Math.round((1-pv.mins/60)*100));

    if (i === 0) {
      html += `<div class="passage-item first"><div class="p-badge">C1</div><div class="p-dest"><div class="p-dest-main">${dir}${retard}</div><div class="p-dest-sub">à ${pv.hAff}</div></div><div class="p-temps"><div class="p-mins ${cls}">${val}</div><div class="p-label">${lbl}</div></div></div><div class="p-bar"><div class="p-fill" style="width:${pct}%"></div></div>`;
    } else {
      html += `<div class="passage-item"><div class="p-badge" style="background:rgba(0,0,0,0.08);color:var(--texte-sec)">C1</div><div class="p-dest"><div class="p-dest-main" style="font-size:13px">${dir}${retard}</div><div class="p-dest-sub">à ${pv.hAff}</div></div><div class="p-temps"><div class="p-mins ${cls}" style="font-size:16px">${val}</div><div class="p-label">${lbl}</div></div></div>`;
    }
  });

  div.innerHTML = html;
}

function renderArrets() {
  if (!ligneActuelle?.arrets?.length) return;
  const q = (document.getElementById('arret-search')?.value||'').toLowerCase();
  const arrets = ligneActuelle.arrets;
  let html = '';
  arrets.forEach((a, i) => {
    if (q && !a.nom.toLowerCase().includes(q)) return;
    const isT = i === 0 || i === arrets.length-1;
    const isSel = arretSel === i;
    const pvs = a.passages.map((h,pi) => { const p = perturb(`${a.nom}-${pi}`); return { mins: mAvant(h,p), hAff: hFmt(h,p) }; }).filter(x=>x.mins>=0&&x.mins<=90).sort((a,b)=>a.mins-b.mins);
    const pv = pvs[0];
    const mstr = pv ? (pv.mins<=60?`${pv.mins} min`:pv.hAff) : '—';
    const isLast = i === arrets.length-1;
    html += `<div class="arret-row${isSel?' sel':''}" onclick="selArret(${i})"><div class="arret-tl"><div class="arret-dot${isT?' t':''}"></div>${!isLast?'<div class="arret-trait"></div>':''}</div><div class="arret-info"><div class="arret-name">${a.nom}</div></div><div class="arret-next"><div class="arret-mins">${mstr}</div><div class="arret-h">${pv?.hAff||''}</div></div></div>`;
  });
  document.getElementById('arrets-list').innerHTML = html;
}

function selArret(i) {
  arretSel = i;
  renderArrets();
  renderLive();
  if (vue === 'full') renderFull(i);
}

function filtrer() { renderArrets(); }

function setVue(v) {
  vue = v;
  document.getElementById('tb-live').classList.toggle('active', v==='live');
  document.getElementById('tb-full').classList.toggle('active', v==='full');
  document.getElementById('vue-full').style.display = v==='full'?'block':'none';
  document.getElementById('detail-arret').style.display = v==='live'?'block':'none';
  if (v==='full') renderFull(arretSel);
}

function renderFull(idx) {
  if (!ligneActuelle?.arrets?.length) return;
  const arret = idx!==null ? ligneActuelle.arrets[idx] : ligneActuelle.arrets[0];
  const hNowMins = new Date().getHours()*60+new Date().getMinutes();
  const tranches = {};
  arret.passages.forEach(h => {
    const k = parseInt(h.split(':')[0]).toString().padStart(2,'0')+'h';
    if(!tranches[k]) tranches[k]=[];
    tranches[k].push(h);
  });
  let html = `<div class="horaire-complet"><div class="h-section-title">Horaire complet — ${arret.nom}</div>`;
  Object.entries(tranches).forEach(([t,hs]) => {
    html += `<div class="h-section-title" style="background:transparent;font-size:11px">${t}</div><div class="h-pills">`;
    hs.forEach(h => {
      const [hh,mm] = h.split(':').map(Number);
      const cur = Math.abs(hh*60+mm - hNowMins) < 5;
      html += `<div class="h-pill${cur?' cur':''}">${h}</div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('vue-full').innerHTML = html;
}

function genPDF() {
  const dir = document.getElementById('sel-dir').value;
  const jour = jourType();
  window.open(`generer-pdf.html?code=${CODE}&direction=${encodeURIComponent(dir)}&jour=${jour}`, '_blank');
}

// Init direct (pas de fetch nécessaire)
recharger();
</script>
